<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RÚV Sarpurinn Downloader</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>
<body>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
        <i class="bi bi-moon-fill" id="themeIcon"></i>
    </button>

    <!-- Header -->
    <header class="site-header">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h1 class="site-title">RÚV <span>Sarpurinn</span></h1>
                    <p class="site-subtitle">Downloader</p>
                </div>
                <a href="/download/" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-folder2-open me-1"></i> Downloads
                </a>
            </div>
        </div>
    </header>

    <div class="container py-4">

        <!-- EPG Status -->
        <div id="epgStatus" class="epg-status mb-4">
            <div class="d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center gap-2">
                    <i class="bi bi-broadcast-pin fs-5"></i>
                    <small id="epgStatusText">Checking EPG status...</small>
                </div>
                <button id="downloadEpgBtn" class="btn btn-sm btn-primary d-none">
                    <i class="bi bi-cloud-download me-1"></i> Download EPG
                </button>
            </div>
        </div>

        <!-- Search -->
        <div class="search-wrapper mb-4">
            <form id="searchForm">
                <div class="search-box">
                    <i class="bi bi-search search-icon"></i>
                    <input type="text" id="searchInput" class="form-control search-input"
                           placeholder="Search for movies, shows, documentaries...">
                </div>
            </form>
        </div>

        <!-- Loading -->
        <div id="loading" class="text-center d-none py-4">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>

        <!-- Results -->
        <div id="results"></div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
